<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIMER.EXE</title>
<link rel="icon" type="image/png" href="top.png">
<link rel="apple-touch-icon" href="top.png">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #060a06;
    --surface:    #0b120b;
    --border:     #1e321e;
    --green:      #5a9a5a;
    --green-hi:   #a0e0a0;
    --green-dim:  #2e5a2e;
    --green-glow: rgba(160,224,160,0.22);
    --text:       #90c890;
    --text-dim:   #527a52;
    --amber:      #c0a04a;
    --danger:     #b05050;
    --danger-hi:  #e08080;
    --mono:       'Share Tech Mono', monospace;
    --vt:         'VT323', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px,
      transparent 1px, transparent 3px
    );
    pointer-events: none; z-index: 999;
    animation: flicker 9s infinite;
  }
  @keyframes flicker {
    0%,100%{opacity:1} 91%{opacity:1} 92%{opacity:.82} 93%{opacity:1} 97%{opacity:1} 98%{opacity:.9} 99%{opacity:1}
  }

  /* grid bg */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--green-dim) 1px, transparent 1px),
      linear-gradient(90deg, var(--green-dim) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.10; pointer-events: none; z-index: 0;
  }

  .wrap {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 28px;
    width: 100%; max-width: 860px;
    padding: 32px 28px;
  }

  /* ── Top bar ── */
  .topbar {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    border: 1px solid var(--border);
    padding: 10px 20px;
    background: var(--surface);
    font-size: 20px; letter-spacing: 0.2em;
    color: var(--text-dim);
  }
  .topbar-title { color: var(--green-hi); letter-spacing: 0.35em; font-size: 22px; }
  .blink { animation: bl 1.1s step-end infinite; }
  @keyframes bl { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Main display / input ── */
  .display-panel {
    width: 100%;
    border: 1px solid var(--green-dim);
    background: var(--surface);
    padding: 44px 36px 32px;
    position: relative;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.6), 0 0 30px rgba(90,154,90,0.05);
  }
  .display-panel::before {
    content: 'COUNTDOWN';
    position: absolute; top: -1px; left: 18px;
    background: var(--surface); padding: 0 10px;
    font-size: 20px; letter-spacing: 0.35em; color: var(--text-dim);
  }

  /* The actual time display — doubles as input when idle */
  .time-display {
    display: flex; align-items: center; justify-content: center;
    gap: 0;
    cursor: text;
  }

  .seg-wrap {
    display: flex; flex-direction: column; align-items: center;
    position: relative;
    padding-top: 34px;
  }

  .seg-label {
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    font-size: 20px; letter-spacing: 0.3em; color: var(--text-dim);
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
    z-index: 3;
  }

  .seg {
    font-family: var(--vt);
    font-size: clamp(110px, 22vw, 190px);
    line-height: 1;
    color: var(--green-hi);
    text-shadow: 0 0 18px var(--green-glow), 0 0 3px rgba(144,208,144,0.6);
    transition: color 0.3s, text-shadow 0.3s;
    width: 2.1ch;
    height: 1em;
    text-align: center;
    position: relative;
    cursor: text;
    flex-shrink: 0;
  }

  /* Visible span */
  .seg span {
    display: block;
    width: 100%; height: 100%;
    text-align: center;
    pointer-events: none;
  }

  /* Input — type=text so caret always shows */
  .seg input {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: transparent;
    border: none; outline: none;
    font-family: var(--vt);
    font-size: inherit;
    line-height: 1;
    color: transparent;
    caret-color: transparent;
    text-align: center;
    z-index: 2;
    cursor: text;
    padding: 0;
  }

  /* When editing: hide span, show typed text + caret */
  .seg.focused span { visibility: hidden; }
  .seg.focused input {
    color: #fff;
    caret-color: #90d090;
    text-shadow: 0 0 28px rgba(200,255,200,0.5), 0 0 6px rgba(255,255,255,0.8);
    pointer-events: auto;
  }

  .colon {
    font-family: var(--vt);
    font-size: clamp(110px, 22vw, 190px);
    line-height: 1;
    color: var(--text-dim);
    padding: 0 6px;
    align-self: flex-start;
    margin-top: 32px;
    transition: opacity 0.2s;
    user-select: none;
  }

  /* Running states */
  .display-panel.running .seg {
    color: var(--green-hi);
  }
  .display-panel.running .colon {
    animation: blink-c 1s step-end infinite;
  }
  @keyframes blink-c { 0%,100%{opacity:1} 50%{opacity:.12} }

  .display-panel.paused .seg {
    color: var(--amber);
    text-shadow: 0 0 16px rgba(192,160,74,0.35);
  }
  .display-panel.paused .colon { opacity: 0.4; }

  .display-panel.alarm .seg {
    animation: alarm-f 0.5s step-end infinite;
  }
  @keyframes alarm-f {
    0%,100%{ color:var(--danger-hi); text-shadow:0 0 28px rgba(224,128,128,0.55); }
    50%    { color:var(--danger);    text-shadow:none; }
  }

  /* Progress bar */
  .prog-track {
    width: 100%; height: 5px;
    background: var(--border); margin-top: 20px;
    position: relative; overflow: hidden;
  }
  .prog-fill {
    height: 100%; width: 100%;
    background: var(--green-dim);
    transition: width .5s linear, background .3s;
    box-shadow: 0 0 8px rgba(90,154,90,0.5);
  }
  .prog-fill.low { background: var(--danger); box-shadow: 0 0 8px rgba(176,80,80,0.5); }
  .prog-track::after {
    content:''; position:absolute; inset:0;
    background: repeating-linear-gradient(90deg, transparent, transparent 5px, rgba(0,0,0,0.18) 5px, rgba(0,0,0,0.18) 6px);
  }

  /* Status row */
  .status-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 20px;
  }
  .statusline {
    display: flex; align-items: center; gap: 10px;
    font-size: 20px; letter-spacing: 0.22em;
    color: var(--text-dim); text-transform: uppercase;
  }
  .sdot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--text-dim); flex-shrink: 0;
    transition: background .3s, box-shadow .3s;
  }
  .statusline.running .sdot { background:var(--green-hi); box-shadow:0 0 7px var(--green-hi); animation:sdot 1.2s ease-in-out infinite; }
  .statusline.paused  .sdot { background:var(--amber); }
  .statusline.done    .sdot { background:var(--danger-hi); box-shadow:0 0 7px var(--danger-hi); }
  @keyframes sdot { 0%,100%{opacity:1} 50%{opacity:.3} }

  .hint-inline {
    font-size: 20px; color: var(--text-dim); letter-spacing: 0.14em;
  }
  .hint-inline kbd {
    background: var(--bg); border: 1px solid var(--border);
    padding: 3px 10px; font-family: var(--mono); font-size: 20px; color: var(--text);
  }

  /* ── Input panel ── */
  .panel {
    width: 100%;
    border: 1px solid var(--green-dim);
    background: var(--surface);
    position: relative;
    padding: 16px 20px;
  }

  .input-row {
    display: flex; align-items: flex-end; gap: 6px; justify-content: center;
  }

  .field { display: flex; flex-direction: column; align-items: center; gap: 4px; }

  .field label {
    font-size: 9px; letter-spacing: 0.25em;
    color: var(--text-dim); text-transform: uppercase;
  }

  .field input {
    width: 72px; background: var(--bg);
    border: 1px solid var(--green-dim);
    color: var(--green-hi); font-family: var(--mono);
    font-size: 26px; text-align: center;
    padding: 7px 4px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: textfield; -moz-appearance: textfield;
    caret-color: var(--green-hi);
  }
  .field input::-webkit-inner-spin-button,
  .field input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .field input:focus { border-color: var(--green-hi); box-shadow: 0 0 0 2px rgba(144,208,144,0.1); }
  .field input:disabled { opacity: 0.3; cursor: not-allowed; }

  .sep { font-family: var(--mono); font-size: 26px; color: var(--text-dim); padding-bottom: 6px; }

  /* ── Controls ── */
  .controls {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center;
  }

  .btn {
    font-family: var(--mono); font-size: 20px;
    letter-spacing: 0.22em; text-transform: uppercase;
    padding: 16px 36px; border: 1px solid var(--green-dim);
    background: transparent; color: var(--text);
    cursor: pointer; transition: all .18s;
  }
  .btn::before{content:'[ '} .btn::after{content:' ]'}

  /* ── Start/Pause/Resume merged button ── */
  .btn-main {
    border-color: var(--green);
    color: var(--green-hi);
    font-size: 22px;
  }
  .btn-main:hover { box-shadow: 0 0 20px rgba(90,154,90,0.25); background: rgba(90,154,90,0.07); }

  /* running → shows PAUSE — light mint green */
  .btn-main.is-running {
    border-color: #7dd8a0;
    color: #aff0c4;
    text-shadow: 0 0 10px rgba(175,240,196,0.4);
  }
  .btn-main.is-running:hover { box-shadow: 0 0 20px rgba(125,216,160,0.28); background: rgba(125,216,160,0.07); }

  /* paused → shows RESUME — olive/sage green */
  .btn-main.is-paused {
    border-color: #8ab86a;
    color: #bada94;
    text-shadow: 0 0 10px rgba(186,218,148,0.35);
  }
  .btn-main.is-paused:hover { box-shadow: 0 0 20px rgba(138,184,106,0.28); background: rgba(138,184,106,0.07); }

  /* ── Cancel button ── */
  /* inactive: brighter/visible muted red */
  .btn-cancel {
    border-color: rgba(176,80,80,0.5);
    color: #a06060;   /* visible but clearly inactive */
  }
  /* active: fully saturated */
  .btn-cancel.is-active {
    border-color: #d06060;
    color: #f09090;
    text-shadow: 0 0 10px rgba(240,144,144,0.3);
  }
  .btn-cancel.is-active:hover {
    border-color: var(--danger-hi); color: var(--danger-hi);
    box-shadow: 0 0 18px rgba(224,128,128,0.25);
    background: rgba(176,80,80,0.07);
  }
  .btn-cancel:not(.is-active) { pointer-events: none; }

  /* ── Share bar ── */
  .share-bar {
    width:100%; display:flex; align-items:center; gap:10px;
    opacity:0; pointer-events:none; transform:translateY(5px);
    transition:opacity .3s,transform .3s;
  }
  .share-bar.visible { opacity:1; pointer-events:all; transform:translateY(0); }
  .share-label { font-size: 20px; letter-spacing:.22em; color:var(--text-dim); white-space:nowrap; }
  .share-url {
    flex:1; font-family:var(--mono); font-size:20px; color:var(--green);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    background:none; border:none; outline:none; cursor:text;
  }
  .btn-copy { padding:10px 20px; font-size:20px; }
  .btn-copy::before{content:''} .btn-copy::after{content:''}

  /* ── Alarm overlay ── */
  .alarm-overlay {
    position:fixed; inset:0; pointer-events:none; opacity:0; z-index:0; transition:opacity .4s;
  }
  .alarm-overlay.active { opacity:1; animation:ao 1s ease-in-out infinite alternate; }
  @keyframes ao { from{background:rgba(176,80,80,0.04)} to{background:rgba(176,80,80,0.11)} }

  /* ── Toast ── */
  .toast {
    position:fixed; bottom:28px; left:50%;
    transform:translateX(-50%) translateY(16px);
    background:var(--green-dim); border:1px solid var(--green);
    color:var(--green-hi); font-size:20px; letter-spacing:.22em;
    text-transform:uppercase; padding:9px 18px; opacity:0;
    transition:opacity .3s,transform .3s; z-index:9999; pointer-events:none;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)}
    40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
  }
</style>
</head>
<body>

<div class="alarm-overlay" id="alarmOverlay"></div>

<div class="wrap">

  <div class="topbar">
    <span class="topbar-title">TIMER<span class="blink">_</span>EXE</span>
    <span id="sysClock">--:--:--</span>
    <span style="font-size:11px;letter-spacing:.15em">v2.0</span>
  </div>

  <div class="display-panel" id="displayPanel">

    <div class="time-display" id="timeDisplay">
      <div class="seg-wrap">
        <div class="seg-label">hours</div>
        <div class="seg" id="segH">
          <span id="txtH">00</span>
          <input type="text" inputmode="numeric" id="inH" maxlength="2" autocomplete="off">
        </div>
      </div>
      <div class="colon" id="col1">:</div>
      <div class="seg-wrap">
        <div class="seg-label">min</div>
        <div class="seg" id="segM">
          <span id="txtM">00</span>
          <input type="text" inputmode="numeric" id="inM" maxlength="2" autocomplete="off">
        </div>
      </div>
      <div class="colon" id="col2">:</div>
      <div class="seg-wrap">
        <div class="seg-label">sec</div>
        <div class="seg" id="segS">
          <span id="txtS">00</span>
          <input type="text" inputmode="numeric" id="inS" maxlength="2" autocomplete="off">
        </div>
      </div>
    </div>

    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>

    <div class="status-row">
      <div class="statusline" id="statusEl"><div class="sdot"></div><span id="statusTxt">IDLE — CLICK TO SET TIME</span></div>
      <div class="hint-inline"><kbd>SPACE</kbd> pause/resume</div>
    </div>

  </div>

  <div class="controls">
    <button class="btn btn-main" id="btnMain" onclick="mainAction()">START</button>
    <button class="btn btn-cancel" id="btnCancel" onclick="cancelTimer()">CANCEL</button>
  </div>

  <div class="share-bar" id="shareBar">
    <span class="share-label">SHARE //</span>
    <input class="share-url" id="shareUrl" readonly>
    <button class="btn btn-copy" onclick="copyLink()">COPY</button>
  </div>

</div>

<div class="toast" id="toast">LINK COPIED</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let endTime = null, pauseLeft = null;
let running = false, paused = false, alarm = false;
let raf = null, totalSec = 0;
let audioCtx = null, alarmInt = null, alarmNextTime = 0;
// Track all scheduled oscillator stop times so we can hard-stop them
let activeNodes = [];

// ── DOM ───────────────────────────────────────────────────────────────────
const displayPanel = document.getElementById('displayPanel');
const txtH = document.getElementById('txtH'), txtM = document.getElementById('txtM'), txtS = document.getElementById('txtS');
const segH = document.getElementById('segH'), segM = document.getElementById('segM'), segS = document.getElementById('segS');
const inH  = document.getElementById('inH'),  inM  = document.getElementById('inM'),  inS  = document.getElementById('inS');
const statusEl = document.getElementById('statusEl'), statusTxt = document.getElementById('statusTxt');
const btnMain = document.getElementById('btnMain'), btnCancel = document.getElementById('btnCancel');
const shareBar = document.getElementById('shareBar'), shareUrl = document.getElementById('shareUrl');
const alarmOverlay = document.getElementById('alarmOverlay'), toast = document.getElementById('toast');
const progFill = document.getElementById('progFill');

// ── Main button dispatcher ────────────────────────────────────────────────
function mainAction() {
  if (alarm)          { resetAll(); return; }
  if (!running)       { startTimer(); return; }
  togglePause();
}

function setMainBtn(state) {
  // state: 'idle' | 'running' | 'paused' | 'alarm'
  btnMain.className = 'btn btn-main';
  if (state === 'running') { btnMain.classList.add('is-running'); btnMain.textContent = 'PAUSE'; }
  else if (state === 'paused') { btnMain.classList.add('is-paused'); btnMain.textContent = 'RESUME'; }
  else if (state === 'alarm') { btnMain.textContent = 'RESET'; }
  else { btnMain.textContent = 'START'; }
}

function setCancelBtn(active) {
  btnCancel.className = 'btn btn-cancel' + (active ? ' is-active' : '');
}


setInterval(() => {
  const n = new Date();
  document.getElementById('sysClock').textContent = [n.getHours(),n.getMinutes(),n.getSeconds()].map(pad).join(':');
}, 1000);

// ── Inputs setup ─────────────────────────────────────────────────────────
[{seg:segH,inp:inH,txt:txtH,max:99},{seg:segM,inp:inM,txt:txtM,max:59},{seg:segS,inp:inS,txt:txtS,max:59}]
.forEach(({seg,inp,txt,max}) => {
  seg.addEventListener('click', () => {
    if (running || alarm) return;
    inp.value = '';
    txt.textContent = '';
    seg.classList.add('focused');
    inp.style.pointerEvents = 'auto';
    inp.focus();
  });
  inp.addEventListener('focus', () => {
    if (running || alarm) { inp.blur(); return; }
    seg.classList.add('focused');
    inp.style.pointerEvents = 'auto';
  });
  inp.addEventListener('blur', () => {
    seg.classList.remove('focused');
    inp.style.pointerEvents = 'none';
    const v = Math.min(max, Math.max(0, parseInt(inp.value) || 0));
    inp.value = '';
    txt.textContent = pad(v);
  });
  inp.addEventListener('input', () => {
    // strip non-digits
    inp.value = inp.value.replace(/\D/g, '');
    const v = parseInt(inp.value) || 0;
    txt.textContent = pad(Math.min(max, v));
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { inp.blur(); startTimer(); }
    if (e.code === 'Space') e.stopPropagation();
  });
});

function setInputsDisabled(v) {
  [segH,segM,segS].forEach(s => { s.style.cursor = v ? 'default' : 'text'; s.style.pointerEvents = v ? 'none' : ''; });
  [inH,inM,inS].forEach(i => { i.style.pointerEvents = 'none'; }); // always controlled by seg click
}

// ── URL helpers ───────────────────────────────────────────────────────────
function buildURL(endTs, pauseMs) {
  try {
    const base = location.href.split('#')[0];
    return base + '#t=' + btoa(JSON.stringify(pauseMs ? {p:pauseMs} : {e:endTs}));
  } catch { return ''; }
}

function showShare(url) {
  if (!url) return;
  shareUrl.value = url;
  shareBar.classList.add('visible');
  try { history.replaceState(null,'',url); } catch {}
}

function hideShare() {
  shareBar.classList.remove('visible');
  try { history.replaceState(null,'',location.href.split('#')[0]); } catch {}
}

function decodeHash() {
  try {
    const h = location.hash;
    if (!h || !h.startsWith('#t=')) return null;
    return JSON.parse(atob(h.slice(3)));
  } catch { return null; }
}

// ── Audio — Web Audio melody alarm ───────────────────────────────────────

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function scheduleNote(freq, t, dur, vol = 0.22, wave = 'sine') {
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  // gentle reverb via delay
  const delay = audioCtx.createDelay(0.4);
  const fb    = audioCtx.createGain();
  delay.delayTime.value = 0.18;
  fb.gain.value = 0.28;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.connect(delay);
  delay.connect(fb);
  fb.connect(delay);
  delay.connect(audioCtx.destination);
  osc.type = wave;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.04);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.92);
  osc.start(t); osc.stop(t + dur + 0.05);
  activeNodes.push({ osc, gain });
}

// Pentatonic lullaby-ish phrase in D major penta: D4 F#4 A4 B4 D5 F#5
// Gentle descending call pattern — sounds like a soft chime/music box
const MELODY = [
  // freq,  dur,  vol
  [587.33, 0.38, 0.20],  // D5
  [493.88, 0.28, 0.16],  // B4
  [440.00, 0.28, 0.16],  // A4
  [369.99, 0.50, 0.18],  // F#4
  [0,      0.18, 0],
  [440.00, 0.26, 0.14],  // A4
  [369.99, 0.26, 0.14],  // F#4
  [293.66, 0.60, 0.20],  // D4  — resolve
  [0,      0.30, 0],
];

function scheduleMelody(t) {
  let dt = 0;
  for (const [f, dur, vol] of MELODY) {
    if (f > 0) scheduleNote(f, t + dt, dur, vol, 'sine');
    dt += dur;
  }
  return dt; // total phrase length
}

function startAlarmLoop() {
  initAudio();
  activeNodes = [];
  alarmNextTime = audioCtx.currentTime + 0.05;
  // Pre-schedule 3 s ahead
  while (alarmNextTime < audioCtx.currentTime + 3)
    alarmNextTime += scheduleMelody(alarmNextTime) + 0.55;

  alarmInt = setInterval(() => {
    if (!alarm) { clearInterval(alarmInt); alarmInt = null; return; }
    while (alarmNextTime < audioCtx.currentTime + 3)
      alarmNextTime += scheduleMelody(alarmNextTime) + 0.55;
  }, 100);
}

function stopAlarmNow() {
  if (alarmInt) { clearInterval(alarmInt); alarmInt = null; }
  alarm = false;
  activeNodes.forEach(({ osc, gain }) => {
    try { gain.gain.cancelScheduledValues(0); gain.gain.setValueAtTime(0, audioCtx.currentTime); } catch {}
    try { osc.stop(audioCtx.currentTime); } catch {}
    try { osc.disconnect(); gain.disconnect(); } catch {}
  });
  activeNodes = [];
}

// ── Display ───────────────────────────────────────────────────────────────
function pad(n) { return String(Math.floor(Math.max(0,n))).padStart(2,'0'); }

function setDisplay(ms) {
  const tot = Math.max(0, Math.ceil(ms/1000));
  txtH.textContent = pad(Math.floor(tot/3600));
  txtM.textContent = pad(Math.floor((tot%3600)/60));
  txtS.textContent = pad(tot%60);
  if (totalSec > 0) {
    const pct = Math.min(100, (tot/totalSec)*100);
    progFill.style.width = pct + '%';
    progFill.classList.toggle('low', pct < 20);
  }
}

function setStatus(state, label) {
  statusEl.className = 'statusline ' + state;
  statusTxt.textContent = label || {running:'RUNNING',paused:'PAUSED',done:'DONE','':'IDLE — CLICK TO SET TIME'}[state] || 'IDLE';
}

// ── Tick ──────────────────────────────────────────────────────────────────
function tick() {
  if (!running || paused) return;
  const left = endTime - Date.now();
  if (left <= 0) { setDisplay(0); triggerAlarm(); return; }
  setDisplay(left);
  raf = requestAnimationFrame(tick);
}

function triggerAlarm() {
  running = false; alarm = true;
  displayPanel.className = 'display-panel alarm';
  alarmOverlay.classList.add('active');
  setStatus('done', 'TIME UP — PRESS SPACE OR RESET');
  setMainBtn('alarm');
  setCancelBtn(true);   // cancel stays active so user can dismiss alarm
  setInputsDisabled(true);
  hideShare();
  startAlarmLoop();
}

// ── Controls ──────────────────────────────────────────────────────────────
function inputSecs() {
  return (parseInt(txtH.textContent)||0)*3600 + (parseInt(txtM.textContent)||0)*60 + (parseInt(txtS.textContent)||0);
}

function startTimer() {
  initAudio();
  if (alarm) { resetAll(); return; }
  if (!running) {
    const secs = inputSecs();
    if (secs <= 0) {
      displayPanel.style.animation = 'none';
      requestAnimationFrame(() => { displayPanel.style.animation = 'shake 0.4s ease'; });
      return;
    }
    totalSec = secs; endTime = Date.now() + secs*1000;
    running = true; paused = false;
    displayPanel.className = 'display-panel running';
    setStatus('running');
    setMainBtn('running');
    setCancelBtn(true);
    setInputsDisabled(true);
    setDisplay(secs*1000); progFill.style.width = '100%';
    showShare(buildURL(endTime, null));
    raf = requestAnimationFrame(tick);
  }
}

function togglePause() {
  if (!running && !paused) return;
  initAudio();
  if (!paused) {
    pauseLeft = Math.max(0, endTime - Date.now());
    paused = true; cancelAnimationFrame(raf);
    displayPanel.className = 'display-panel paused';
    setStatus('paused');
    setMainBtn('paused');
    showShare(buildURL(null, pauseLeft));
  } else {
    endTime = Date.now() + pauseLeft; paused = false; pauseLeft = null;
    displayPanel.className = 'display-panel running';
    setStatus('running');
    setMainBtn('running');
    showShare(buildURL(endTime, null));
    raf = requestAnimationFrame(tick);
  }
}

function cancelTimer() { resetAll(); }

function resetAll() {
  cancelAnimationFrame(raf);
  stopAlarmNow();           // ← immediate silence
  running = false; paused = false;
  endTime = null; pauseLeft = null; totalSec = 0;
  progFill.style.width = '100%'; progFill.classList.remove('low');
  setDisplay(0);
  txtH.textContent = '00'; txtM.textContent = '00'; txtS.textContent = '00';
  inH.value = 0; inM.value = 0; inS.value = 0;
  displayPanel.className = 'display-panel';
  alarmOverlay.classList.remove('active');
  setStatus('');
  setMainBtn('idle');
  setCancelBtn(false);
  setInputsDisabled(false);
  hideShare();
}

// ── Keyboard ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code !== 'Space' || e.target.tagName === 'INPUT') return;
  e.preventDefault();
  if (alarm) { resetAll(); return; }
  if (running || paused) togglePause(); else startTimer();
});

// ── Copy ──────────────────────────────────────────────────────────────────
function copyLink() {
  const url = shareUrl.value; if (!url) return;
  const show = () => { toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2000); };
  navigator.clipboard.writeText(url).then(show).catch(()=>{ shareUrl.select(); document.execCommand('copy'); show(); });
}

// ── Init from URL ─────────────────────────────────────────────────────────
(function init() {
  const state = decodeHash(); if (!state) return;
  if (state.e) {
    const left = state.e - Date.now(); if (left<=0) return;
    totalSec = Math.ceil(left/1000); endTime = state.e; running = true;
    txtH.textContent = pad(Math.floor(totalSec/3600));
    txtM.textContent = pad(Math.floor((totalSec%3600)/60));
    txtS.textContent = pad(totalSec%60);
    setDisplay(left);
    displayPanel.className = 'display-panel running';
    setStatus('running');
    setMainBtn('running');
    setCancelBtn(true);
    setInputsDisabled(true);
    showShare(buildURL(endTime,null));
    raf = requestAnimationFrame(tick);
  } else if (state.p) {
    totalSec = Math.ceil(state.p/1000); pauseLeft = state.p; running = true; paused = true;
    txtH.textContent = pad(Math.floor(totalSec/3600));
    txtM.textContent = pad(Math.floor((totalSec%3600)/60));
    txtS.textContent = pad(totalSec%60);
    setDisplay(state.p);
    displayPanel.className = 'display-panel paused';
    setStatus('paused');
    setMainBtn('paused');
    setCancelBtn(true);
    setInputsDisabled(true);
    showShare(buildURL(null,pauseLeft));
  }
})();
</script>
</body>
