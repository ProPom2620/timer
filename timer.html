<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIMER.EXE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080b08;
    --surface:   #0c110c;
    --border:    #1a2a1a;
    --green:     #4a7a4a;
    --green-hi:  #7ab07a;
    --green-dim: #2a4a2a;
    --text:      #5a8a5a;
    --text-dim:  #2e4a2e;
    --amber:     #7a6a3a;
    --danger:    #8a4a4a;
    --danger-hi: #c07070;
    --mono:      'Share Tech Mono', monospace;
    --vt:        'VT323', monospace;
    --scanline:  rgba(0,0,0,0.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        var(--scanline) 0px,
        var(--scanline) 1px,
        transparent 1px,
        transparent 3px
      );
    pointer-events: none;
    z-index: 999;
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.85} 94%{opacity:1} 97%{opacity:1} 98%{opacity:0.9} 99%{opacity:1}
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--green-dim) 1px, transparent 1px),
      linear-gradient(90deg, var(--green-dim) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    width: 100%; max-width: 560px;
    padding: 24px 20px;
  }

  .topbar {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    border: 1px solid var(--border);
    padding: 4px 10px;
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--text-dim);
    background: var(--surface);
  }
  .topbar-title { color: var(--green-hi); letter-spacing: 0.3em; }
  .topbar-blink { animation: cblink 1.1s step-end infinite; }
  @keyframes cblink { 0%,100%{opacity:1} 50%{opacity:0} }

  .panel {
    width: 100%;
    border: 1px solid var(--green-dim);
    background: var(--surface);
    position: relative;
    padding: 16px 20px;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 0 20px rgba(74,122,74,0.04);
  }

  .panel::before {
    content: attr(data-label);
    position: absolute;
    top: -1px; left: 12px;
    background: var(--surface);
    padding: 0 6px;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .display-area {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }

  .display {
    font-family: var(--vt);
    font-size: clamp(60px, 13vw, 88px);
    letter-spacing: 0.06em;
    line-height: 1;
    color: var(--green-hi);
    text-shadow: 0 0 12px rgba(122,176,122,0.35), 0 0 2px rgba(122,176,122,0.8);
    transition: color 0.4s, text-shadow 0.4s;
    cursor: default; user-select: none;
  }

  .display.paused {
    color: var(--amber);
    text-shadow: 0 0 10px rgba(122,106,58,0.35);
  }

  .display.alarm { animation: alarm-flash 0.5s step-end infinite; }

  @keyframes alarm-flash {
    0%,100% { color: var(--danger-hi); text-shadow: 0 0 20px rgba(192,112,112,0.5); }
    50%     { color: var(--danger);    text-shadow: none; }
  }

  .display-colon { opacity: 1; }
  .display.running .display-colon { animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

  .progress-track {
    width: 100%; height: 3px;
    background: var(--border);
    position: relative; overflow: hidden;
  }

  .progress-fill {
    height: 100%; background: var(--green-dim); width: 100%;
    transition: width 0.5s linear, background 0.3s;
    box-shadow: 0 0 6px rgba(74,122,74,0.5);
  }
  .progress-fill.low { background: var(--danger); box-shadow: 0 0 6px rgba(138,74,74,0.5); }

  .progress-track::after {
    content:''; position:absolute; inset:0;
    background: repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(0,0,0,0.2) 4px, rgba(0,0,0,0.2) 5px);
  }

  .statusline {
    font-size: 11px; letter-spacing: 0.2em;
    color: var(--text-dim); text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .statusline-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-dim); transition: background 0.3s, box-shadow 0.3s;
  }
  .statusline.running .statusline-dot { background: var(--green-hi); box-shadow: 0 0 6px var(--green-hi); animation: sdot 1.2s ease-in-out infinite; }
  .statusline.paused  .statusline-dot { background: var(--amber); }
  .statusline.done    .statusline-dot { background: var(--danger-hi); box-shadow: 0 0 6px var(--danger-hi); }
  @keyframes sdot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .input-row {
    display: flex; align-items: flex-end; gap: 6px; justify-content: center;
  }

  .field { display: flex; flex-direction: column; align-items: center; gap: 4px; }

  .field label {
    font-size: 9px; letter-spacing: 0.25em;
    color: var(--text-dim); text-transform: uppercase;
  }

  .field input {
    width: 66px; background: var(--bg);
    border: 1px solid var(--green-dim);
    color: var(--green-hi); font-family: var(--mono);
    font-size: 22px; text-align: center;
    padding: 6px 4px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: textfield; -moz-appearance: textfield;
    caret-color: var(--green-hi);
  }

  .field input::-webkit-inner-spin-button,
  .field input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .field input:focus { border-color: var(--green-hi); box-shadow: 0 0 0 2px rgba(122,176,122,0.1); }
  .field input:disabled { opacity: 0.3; cursor: not-allowed; }

  .sep { font-family: var(--mono); font-size: 22px; color: var(--text-dim); padding-bottom: 4px; }

  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }

  .btn {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 8px 18px; border: 1px solid var(--green-dim);
    background: transparent; color: var(--text-dim);
    cursor: pointer; transition: all 0.15s;
  }

  .btn::before { content: '[ '; } .btn::after { content: ' ]'; }
  .btn:hover { border-color: var(--green); color: var(--green-hi); background: rgba(74,122,74,0.06); }
  .btn:active { background: rgba(74,122,74,0.12); }

  .btn-primary { border-color: var(--green); color: var(--green-hi); }
  .btn-primary:hover { box-shadow: 0 0 14px rgba(74,122,74,0.2); }

  .btn-danger { border-color: rgba(138,74,74,0.4); color: var(--danger); }
  .btn-danger:hover { border-color: var(--danger-hi); color: var(--danger-hi); box-shadow: 0 0 14px rgba(138,74,74,0.15); }

  .btn:disabled { opacity: 0.25; pointer-events: none; }

  .btn-icon { padding: 8px 12px; font-size: 14px; }
  .btn-icon::before { content: ''; } .btn-icon::after { content: ''; }

  .share-bar {
    width: 100%; display: flex; align-items: center; gap: 8px;
    opacity: 0; pointer-events: none; transform: translateY(4px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .share-bar.visible { opacity: 1; pointer-events: all; transform: translateY(0); }

  .share-label { font-size: 9px; letter-spacing: 0.2em; color: var(--text-dim); white-space: nowrap; }

  .share-url {
    flex: 1; font-family: var(--mono); font-size: 11px;
    color: var(--green); overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; background: none; border: none; outline: none; cursor: text;
  }

  .btn-copy { padding: 5px 12px; font-size: 10px; }
  .btn-copy::before { content: ''; } .btn-copy::after { content: ''; }

  .hint { font-size: 10px; color: var(--text-dim); letter-spacing: 0.12em; text-align: center; }
  .hint kbd {
    background: var(--surface); border: 1px solid var(--border);
    padding: 1px 5px; font-family: var(--mono); font-size: 10px; color: var(--text);
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--green-dim); border: 1px solid var(--green);
    color: var(--green-hi); font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; padding: 8px 16px; opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 9999; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .alarm-overlay {
    position: fixed; inset: 0; pointer-events: none; opacity: 0; z-index: 0; transition: opacity 0.4s;
  }
  .alarm-overlay.active { opacity: 1; animation: ao 1s ease-in-out infinite alternate; }
  @keyframes ao { from{background:rgba(138,74,74,0.04)} to{background:rgba(138,74,74,0.1)} }

  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
  }
</style>
</head>
<body>

<div class="alarm-overlay" id="alarmOverlay"></div>

<div class="container">

  <div class="topbar">
    <span class="topbar-title">TIMER<span class="topbar-blink">_</span>EXE</span>
    <span id="sysClock">--:--:--</span>
    <span>v1.0</span>
  </div>

  <div class="panel" data-label="COUNTDOWN" style="text-align:center">
    <div class="display-area">
      <div class="display" id="display">
        <span id="dH">00</span><span class="display-colon">:</span><span id="dM">00</span><span class="display-colon">:</span><span id="dS">00</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progFill"></div>
      </div>
    </div>
    <div style="margin-top:10px;display:flex;justify-content:center">
      <div class="statusline" id="statusEl">
        <div class="statusline-dot"></div>
        <span id="statusTxt">IDLE</span>
      </div>
    </div>
  </div>

  <div class="panel" data-label="SET TIME" id="inputPanel">
    <div class="input-row">
      <div class="field"><label>HH</label><input type="number" id="inH" min="0" max="99" value="0"></div>
      <div class="sep">:</div>
      <div class="field"><label>MM</label><input type="number" id="inM" min="0" max="59" value="0"></div>
      <div class="sep">:</div>
      <div class="field"><label>SS</label><input type="number" id="inS" min="0" max="59" value="0"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="btnStart" onclick="startTimer()">START</button>
    <button class="btn btn-icon"    id="btnPause" onclick="togglePause()" disabled>⏸</button>
    <button class="btn btn-danger"  id="btnCancel" onclick="cancelTimer()" disabled>CANCEL</button>
  </div>

  <div class="share-bar" id="shareBar">
    <span class="share-label">SHARE //</span>
    <input class="share-url" id="shareUrl" readonly>
    <button class="btn btn-copy" onclick="copyLink()">COPY</button>
  </div>

  <div class="hint"><kbd>SPACE</kbd> to pause / resume &nbsp;·&nbsp; share URL syncs the timer</div>

</div>

<div class="toast" id="toast">LINK COPIED</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let endTime   = null, pauseLeft = null;
let running   = false, paused = false, alarm = false;
let raf       = null, totalSec = 0;
let audioCtx  = null, alarmInt = null, alarmNextTime = 0;

// ── DOM ───────────────────────────────────────────────────────────────────
const display      = document.getElementById('display');
const dH           = document.getElementById('dH');
const dM           = document.getElementById('dM');
const dS           = document.getElementById('dS');
const statusEl     = document.getElementById('statusEl');
const statusTxt    = document.getElementById('statusTxt');
const btnStart     = document.getElementById('btnStart');
const btnPause     = document.getElementById('btnPause');
const btnCancel    = document.getElementById('btnCancel');
const inH          = document.getElementById('inH');
const inM          = document.getElementById('inM');
const inS          = document.getElementById('inS');
const shareBar     = document.getElementById('shareBar');
const shareUrl     = document.getElementById('shareUrl');
const alarmOverlay = document.getElementById('alarmOverlay');
const toast        = document.getElementById('toast');
const progFill     = document.getElementById('progFill');
const inputPanel   = document.getElementById('inputPanel');

// ── System clock ──────────────────────────────────────────────────────────
function tickSysClock() {
  const n = new Date();
  document.getElementById('sysClock').textContent =
    [n.getHours(), n.getMinutes(), n.getSeconds()].map(pad).join(':');
}
setInterval(tickSysClock, 1000); tickSysClock();

// ── URL helpers — safe (no history.replaceState crash in iframe) ──────────
function buildURL(endTs, pauseMs) {
  try {
    const base = location.href.split('#')[0];
    const obj  = pauseMs ? {p: pauseMs} : {e: endTs};
    return base + '#t=' + btoa(JSON.stringify(obj));
  } catch { return ''; }
}

function showShare(url) {
  if (!url) return;
  shareUrl.value = url;
  shareBar.classList.add('visible');
  try { history.replaceState(null, '', url); } catch { /* iframe sandbox — ignore */ }
}

function hideShare() {
  shareBar.classList.remove('visible');
  try { history.replaceState(null, '', location.href.split('#')[0]); } catch {}
}

function decodeHash() {
  try {
    const h = location.hash;
    if (!h || !h.startsWith('#t=')) return null;
    return JSON.parse(atob(h.slice(3)));
  } catch { return null; }
}

// ── Audio — Web Audio API scheduler (plays reliably in background tabs) ───
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function scheduleBeep(freq, t, dur, vol=0.3) {
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'square';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t); osc.stop(t + dur + 0.01);
}

function schedulePhrase(t) {
  // ascending alert pattern
  const p = [[880,0.10],[0,0.05],[880,0.10],[0,0.05],[1100,0.18],[0,0.12]];
  let dt = 0;
  for (const [f, d] of p) { if (f>0) scheduleBeep(f, t+dt, d); dt += d; }
  return dt; // ~0.6 s
}

function startAlarmLoop() {
  initAudio();
  alarmNextTime = audioCtx.currentTime + 0.05;
  // pre-schedule 2 s of audio so background throttling can't gap it
  while (alarmNextTime < audioCtx.currentTime + 2)
    alarmNextTime += schedulePhrase(alarmNextTime) + 0.35;

  // every 100 ms keep the 2-second lookahead full
  alarmInt = setInterval(() => {
    if (!alarm || !audioCtx) { clearInterval(alarmInt); alarmInt = null; return; }
    while (alarmNextTime < audioCtx.currentTime + 2)
      alarmNextTime += schedulePhrase(alarmNextTime) + 0.35;
  }, 100);
}

function stopAlarmLoop() {
  if (alarmInt) { clearInterval(alarmInt); alarmInt = null; }
}

// ── Display ───────────────────────────────────────────────────────────────
function pad(n) { return String(Math.floor(Math.max(0,n))).padStart(2,'0'); }

function setDisplay(ms) {
  const tot = Math.max(0, Math.ceil(ms / 1000));
  dH.textContent = pad(Math.floor(tot / 3600));
  dM.textContent = pad(Math.floor((tot % 3600) / 60));
  dS.textContent = pad(tot % 60);
  if (totalSec > 0) {
    const pct = Math.min(100, (tot / totalSec) * 100);
    progFill.style.width = pct + '%';
    progFill.classList.toggle('low', pct < 20);
  }
}

function setStatus(state) {
  statusEl.className = 'statusline ' + state;
  statusTxt.textContent = {running:'RUNNING', paused:'PAUSED', done:'DONE', '':'IDLE'}[state] || 'IDLE';
}

// ── Tick ──────────────────────────────────────────────────────────────────
function tick() {
  if (!running || paused) return;
  const left = endTime - Date.now();
  if (left <= 0) { setDisplay(0); triggerAlarm(); return; }
  setDisplay(left);
  raf = requestAnimationFrame(tick);
}

function triggerAlarm() {
  running = false; alarm = true;
  display.classList.remove('running','paused'); display.classList.add('alarm');
  alarmOverlay.classList.add('active');
  setStatus('done');
  btnStart.textContent = 'RESET'; btnStart.disabled = false;
  btnPause.disabled = true; btnCancel.disabled = true;
  setInputsDisabled(false);
  hideShare();
  startAlarmLoop();
}

// ── Controls ──────────────────────────────────────────────────────────────
function inputSecs() {
  return (parseInt(inH.value)||0)*3600 + (parseInt(inM.value)||0)*60 + (parseInt(inS.value)||0);
}

function startTimer() {
  initAudio();
  if (alarm) { resetAll(); return; }
  if (!running) {
    const secs = inputSecs();
    if (secs <= 0) {
      inputPanel.style.animation = 'none';
      requestAnimationFrame(() => { inputPanel.style.animation = 'shake 0.4s ease'; });
      return;
    }
    totalSec = secs; endTime = Date.now() + secs * 1000;
    running = true; paused = false;
    display.classList.add('running'); display.classList.remove('alarm','paused');
    setStatus('running');
    btnStart.textContent = 'RUNNING…'; btnStart.disabled = true;
    btnPause.disabled = false; btnPause.textContent = '⏸';
    btnCancel.disabled = false;
    setInputsDisabled(true);
    setDisplay(secs * 1000); progFill.style.width = '100%';
    showShare(buildURL(endTime, null));
    raf = requestAnimationFrame(tick);
  }
}

function togglePause() {
  if (!running && !paused) return;
  initAudio();
  if (!paused) {
    pauseLeft = Math.max(0, endTime - Date.now());
    paused = true; cancelAnimationFrame(raf);
    display.classList.add('paused'); display.classList.remove('running');
    setStatus('paused');
    btnPause.textContent = '▶'; btnStart.textContent = 'PAUSED';
    showShare(buildURL(null, pauseLeft));
  } else {
    endTime = Date.now() + pauseLeft; paused = false; pauseLeft = null;
    display.classList.remove('paused'); display.classList.add('running');
    setStatus('running');
    btnPause.textContent = '⏸'; btnStart.textContent = 'RUNNING…';
    showShare(buildURL(endTime, null));
    raf = requestAnimationFrame(tick);
  }
}

function cancelTimer() { resetAll(); }

function resetAll() {
  cancelAnimationFrame(raf);
  running = false; paused = false; alarm = false;
  endTime = null; pauseLeft = null; totalSec = 0;
  stopAlarmLoop();
  progFill.style.width = '100%'; progFill.classList.remove('low');
  setDisplay(0);
  display.classList.remove('running','paused','alarm');
  alarmOverlay.classList.remove('active');
  setStatus('');
  btnStart.textContent = 'START'; btnStart.disabled = false;
  btnPause.textContent = '⏸'; btnPause.disabled = true;
  btnCancel.disabled = true;
  setInputsDisabled(false);
  hideShare();
}

function setInputsDisabled(v) { inH.disabled=v; inM.disabled=v; inS.disabled=v; }

// ── Keyboard ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code !== 'Space' || e.target.tagName === 'INPUT') return;
  e.preventDefault();
  if (alarm) { resetAll(); return; }
  if (running || paused) togglePause(); else startTimer();
});

// ── Input formatting ──────────────────────────────────────────────────────
[inH, inM, inS].forEach(inp => {
  inp.addEventListener('blur', () => { inp.value = pad(Math.min(inp===inH?99:59, Math.max(0, parseInt(inp.value)||0))); });
  inp.addEventListener('focus', () => inp.select());
});

// ── Copy ──────────────────────────────────────────────────────────────────
function copyLink() {
  const url = shareUrl.value; if (!url) return;
  const show = () => { toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2000); };
  navigator.clipboard.writeText(url).then(show).catch(()=>{ shareUrl.select(); document.execCommand('copy'); show(); });
}

// ── Init from URL ─────────────────────────────────────────────────────────
(function init() {
  const state = decodeHash(); if (!state) return;
  if (state.e) {
    const left = state.e - Date.now(); if (left <= 0) return;
    totalSec = Math.ceil(left/1000); endTime = state.e; running = true;
    inH.value = pad(Math.floor(totalSec/3600));
    inM.value = pad(Math.floor((totalSec%3600)/60));
    inS.value = pad(totalSec%60);
    setDisplay(left); display.classList.add('running');
    setStatus('running');
    btnStart.textContent='RUNNING…'; btnStart.disabled=true;
    btnPause.disabled=false; btnCancel.disabled=false;
    setInputsDisabled(true);
    showShare(buildURL(endTime,null));
    raf = requestAnimationFrame(tick);
  } else if (state.p) {
    totalSec = Math.ceil(state.p/1000); pauseLeft = state.p; running = true; paused = true;
    inH.value = pad(Math.floor(totalSec/3600));
    inM.value = pad(Math.floor((totalSec%3600)/60));
    inS.value = pad(totalSec%60);
    setDisplay(state.p); display.classList.add('paused');
    setStatus('paused');
    btnStart.textContent='PAUSED'; btnStart.disabled=true;
    btnPause.textContent='▶'; btnPause.disabled=false; btnCancel.disabled=false;
    setInputsDisabled(true);
    showShare(buildURL(null,pauseLeft));
  }
})();
</script>
</body>
</html>
