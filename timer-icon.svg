<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0c180c"/>
      <stop offset="100%" stop-color="#050905"/>
    </radialGradient>
    <linearGradient id="sandTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4a8a4a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1e3e1e" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sandBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a5a2a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5aaa5a" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-xl" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" x="0" y="0" width="512" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="512" height="1" fill="rgba(0,0,0,0.22)"/>
    </pattern>
    <clipPath id="clip"><rect width="512" height="512" rx="88"/></clipPath>
    <clipPath id="topClip"><polygon points="148,92 364,92 264,255 248,255"/></clipPath>
    <clipPath id="botClip"><polygon points="148,420 364,420 264,257 248,257"/></clipPath>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.65)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Grid -->
  <g clip-path="url(#clip)" opacity="0.055" stroke="#5aaa5a" stroke-width="1">
    <line x1="0" y1="64"  x2="512" y2="64"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
    <line x1="64"  y1="0" x2="64"  y2="512"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
  </g>

  <!-- Top sand fill -->
  <polygon points="150,93 362,93 280,215 232,215"
    fill="url(#sandTop)" clip-path="url(#topClip)" opacity="0.9"/>

  <!-- Bottom sand pile -->
  <polygon points="184,388 328,388 290,330 222,330"
    fill="url(#sandBot)" clip-path="url(#botClip)" opacity="0.92"/>

  <!-- Outer glow bloom for hourglass -->
  <path d="M152,92 L360,92 L263,253 Q256,267 249,253 L152,92 Z"
    fill="none" stroke="#90d090" stroke-width="18" stroke-linejoin="round"
    opacity="0.07" filter="url(#glow-xl)"/>
  <path d="M152,420 L360,420 L263,259 Q256,245 249,259 L152,420 Z"
    fill="none" stroke="#90d090" stroke-width="18" stroke-linejoin="round"
    opacity="0.07" filter="url(#glow-xl)"/>

  <!-- Hourglass top half -->
  <path d="M152,92 L360,92 L263,253 Q256,267 249,253 L152,92 Z"
    fill="none" stroke="#90d090" stroke-width="3.5" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Hourglass bottom half -->
  <path d="M152,420 L360,420 L263,259 Q256,245 249,259 L152,420 Z"
    fill="none" stroke="#90d090" stroke-width="3.5" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Top cap -->
  <rect x="130" y="78" width="252" height="16" rx="5"
    fill="#091409" stroke="#90d090" stroke-width="3" filter="url(#glow)"/>
  <line x1="148" y1="86" x2="364" y2="86"
    stroke="#c8ffc8" stroke-width="1.2" opacity="0.4"/>

  <!-- Bottom cap -->
  <rect x="130" y="418" width="252" height="16" rx="5"
    fill="#091409" stroke="#90d090" stroke-width="3" filter="url(#glow)"/>
  <line x1="148" y1="426" x2="364" y2="426"
    stroke="#c8ffc8" stroke-width="1.2" opacity="0.4"/>

  <!-- Sand stream -->
  <line x1="256" y1="267" x2="256" y2="310"
    stroke="#90d090" stroke-width="2.5" stroke-linecap="round"
    filter="url(#glow)" opacity="0.85"/>

  <!-- Stream particles -->
  <circle cx="256" cy="278" r="2.8" fill="#b0e8b0" filter="url(#glow-sm)" opacity="0.9"/>
  <circle cx="255" cy="292" r="2.2" fill="#90d090" filter="url(#glow-sm)" opacity="0.7"/>
  <circle cx="257" cy="304" r="1.6" fill="#90d090" filter="url(#glow-sm)" opacity="0.5"/>
  <circle cx="256" cy="314" r="1.2" fill="#90d090" filter="url(#glow-sm)" opacity="0.35"/>

  <!-- Neck glow dot -->
  <circle cx="256" cy="256" r="5.5" fill="#c8ffc8" filter="url(#glow-xl)" opacity="0.85"/>
  <circle cx="256" cy="256" r="2.5" fill="#ffffff" opacity="0.95"/>

  <!-- Sand particles top half -->
  <circle cx="196" cy="138" r="2.2" fill="#5aaa5a" filter="url(#glow-sm)" opacity="0.6"/>
  <circle cx="225" cy="162" r="1.8" fill="#5aaa5a" filter="url(#glow-sm)" opacity="0.5"/>
  <circle cx="183" cy="175" r="1.5" fill="#4a8a4a" filter="url(#glow-sm)" opacity="0.4"/>
  <circle cx="314" cy="140" r="2.2" fill="#5aaa5a" filter="url(#glow-sm)" opacity="0.55"/>
  <circle cx="292" cy="166" r="1.8" fill="#5aaa5a" filter="url(#glow-sm)" opacity="0.5"/>
  <circle cx="328" cy="174" r="1.5" fill="#4a8a4a" filter="url(#glow-sm)" opacity="0.4"/>
  <circle cx="256" cy="148" r="1.8" fill="#5aaa5a" filter="url(#glow-sm)" opacity="0.45"/>
  <circle cx="218" cy="198" r="1.4" fill="#3a6a3a" opacity="0.4"/>
  <circle cx="296" cy="200" r="1.4" fill="#3a6a3a" opacity="0.4"/>
  <circle cx="240" cy="178" r="1.5" fill="#4a8a4a" opacity="0.35"/>
  <circle cx="272" cy="182" r="1.5" fill="#4a8a4a" opacity="0.35"/>

  <!-- Corner brackets -->
  <path d="M44,44 L44,80 L80,80" fill="none" stroke="#3a6a3a" stroke-width="2.5" stroke-linecap="square" opacity="0.65"/>
  <path d="M468,44 L468,80 L432,80" fill="none" stroke="#3a6a3a" stroke-width="2.5" stroke-linecap="square" opacity="0.65"/>
  <path d="M44,468 L44,432 L80,432" fill="none" stroke="#3a6a3a" stroke-width="2.5" stroke-linecap="square" opacity="0.65"/>
  <path d="M468,468 L468,432 L432,432" fill="none" stroke="#3a6a3a" stroke-width="2.5" stroke-linecap="square" opacity="0.65"/>

  <!-- Label -->
  <text x="256" y="472" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="13" letter-spacing="5" fill="#4a7a4a" opacity="0.85">TIMER.EXE</text>

  <!-- Scanlines overlay -->
  <rect width="512" height="512" rx="88" fill="url(#scan)" opacity="0.45"/>

  <!-- Vignette -->
  <rect width="512" height="512" rx="88" fill="url(#vig)"/>

  <!-- Border -->
  <rect x="2.5" y="2.5" width="507" height="507" rx="86" fill="none" stroke="#2e5a2e" stroke-width="2.5"/>
  <rect x="7"   y="7"   width="498" height="498" rx="82" fill="none" stroke="#1a2e1a" stroke-width="1" opacity="0.5"/>
</svg>
